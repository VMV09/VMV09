<svg viewBox="0 0 880 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Engineering console — core competencies and engineering impact">
  <defs>
    <style>
      .mono  { font-family: ui-monospace, SFMono-Regular, 'Cascadia Mono', Consolas, Menlo, monospace; }
      .title { fill: #E6EDF3; font-size: 12px; letter-spacing: 2px; }
      .label { fill: #484F58; font-size: 10px; letter-spacing: 1.5px; }
      .item  { fill: #8B949E; font-size: 12px; letter-spacing: 0.3px; }
      .value { fill: #E6EDF3; font-size: 12px; }
      .chip  { fill: #8B949E; font-size: 11px; letter-spacing: 0.4px; }
      .axis  { fill: #484F58; font-size: 9px; }

      /* progress bars fill on load, staggered */
      .bar { animation: grow 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; width: 0; }
      .b1 { animation-delay: 0.3s; } .b2 { animation-delay: 0.5s; }
      .b3 { animation-delay: 0.7s; } .b4 { animation-delay: 0.9s; }
      @keyframes grow { to { width: var(--w); } }
      .b1 { --w: 270px; } .b2 { --w: 255px; } .b3 { --w: 240px; } .b4 { --w: 234px; }

      /* impact chart draws itself */
      .line-unified {
        stroke: #E3B341; stroke-width: 2; fill: none;
        stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 1; stroke-dashoffset: 1;
        animation: draw 2.4s cubic-bezier(0.5, 0, 0.3, 1) 0.6s forwards;
      }
      .line-polyglot {
        stroke: #484F58; stroke-width: 1.5; fill: none;
        stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 4 4;
        opacity: 0; animation: fadein 1.2s ease 0.3s forwards;
      }
      @keyframes draw { to { stroke-dashoffset: 0; } }

      .endpoint { opacity: 0; animation: appear 0.4s ease 3s forwards; }
      @keyframes appear { to { opacity: 1; } }

      .pulse-dot  { fill: #E3B341; }
      .pulse-ring { fill: none; stroke: #E3B341; stroke-width: 1; opacity: 0; animation: ping 2.6s cubic-bezier(0, 0, 0.2, 1) 1.2s infinite; }
      @keyframes ping {
        0%   { r: 3;  opacity: 0.7; }
        70%  { r: 9;  opacity: 0; }
        100% { r: 9;  opacity: 0; }
      }

      .fade { opacity: 0; animation: fadein 0.8s ease forwards; }
      .f1 { animation-delay: 0.1s; } .f2 { animation-delay: 0.3s; } .f3 { animation-delay: 1.1s; }
      @keyframes fadein { to { opacity: 1; } }

      @media (prefers-reduced-motion: reduce) {
        .bar { animation: none; width: var(--w); }
        .line-unified { animation: none; stroke-dasharray: none; stroke-dashoffset: 0; }
        .line-polyglot { animation: none; opacity: 1; }
        .endpoint, .fade { animation: none; opacity: 1; }
        .pulse-ring { animation: none; opacity: 0; }
      }
    </style>
  </defs>

  <!-- window -->
  <rect width="880" height="440" rx="12" fill="#0B0D10"/>
  <rect x="0.5" y="0.5" width="879" height="439" rx="11.5" stroke="#1C2128"/>

  <!-- chrome bar -->
  <circle cx="30" cy="26" r="4.5" fill="#1C2128"/>
  <circle cx="48" cy="26" r="4.5" fill="#1C2128"/>
  <circle cx="66" cy="26" r="4.5" fill="#1C2128"/>
  <text x="440" y="30" text-anchor="middle" class="mono title">ENGINEERING CONSOLE</text>
  <text x="844" y="30" text-anchor="end" class="mono label">engineering profile</text>
  <line x1="0" y1="52" x2="880" y2="52" stroke="#1C2128"/>

  <!-- ─── left panel · core competencies ─── -->
  <g class="fade f1">
    <text x="40" y="92" class="mono label">CORE COMPETENCIES</text>

    <text x="40"  y="126" class="mono item">backend engineering</text>
    <rect x="40" y="136" width="300" height="4" rx="2" fill="#1C2128"/>
    <rect x="40" y="136" height="4" rx="2" fill="#E3B341" class="bar b1"/>
    <text x="356" y="130" class="mono value">90%</text>

    <text x="40"  y="176" class="mono item">ai infrastructure</text>
    <rect x="40" y="186" width="300" height="4" rx="2" fill="#1C2128"/>
    <rect x="40" y="186" height="4" rx="2" fill="#E3B341" class="bar b2"/>
    <text x="356" y="180" class="mono value">85%</text>

    <text x="40"  y="226" class="mono item">distributed systems</text>
    <rect x="40" y="236" width="300" height="4" rx="2" fill="#1C2128"/>
    <rect x="40" y="236" height="4" rx="2" fill="#E3B341" class="bar b3"/>
    <text x="356" y="230" class="mono value">80%</text>

    <text x="40"  y="276" class="mono item">database architecture</text>
    <rect x="40" y="286" width="300" height="4" rx="2" fill="#1C2128"/>
    <rect x="40" y="286" height="4" rx="2" fill="#E3B341" class="bar b4"/>
    <text x="356" y="280" class="mono value">78%</text>

    <text x="40" y="330" class="mono label">APPROACH</text>
    <text x="40" y="352" class="mono item">design systems that are</text>
    <text x="40" y="370" class="mono item">reliable and maintainable —</text>
    <text x="40" y="388" class="mono item">built to outlast the team.</text>
  </g>

  <!-- vertical divider -->
  <line x1="410" y1="76" x2="410" y2="396" stroke="#1C2128"/>

  <!-- ─── right panel · engineering impact ─── -->
  <g class="fade f2">
    <text x="448" y="92" class="mono label">MANUAL EFFORT → AUTOMATION</text>

    <!-- gridlines -->
    <line x1="448" y1="130" x2="836" y2="130" stroke="#E6EDF3" stroke-opacity="0.04"/>
    <line x1="448" y1="180" x2="836" y2="180" stroke="#E6EDF3" stroke-opacity="0.04"/>
    <line x1="448" y1="230" x2="836" y2="230" stroke="#E6EDF3" stroke-opacity="0.04"/>
    <line x1="448" y1="280" x2="836" y2="280" stroke="#1C2128"/>

    <text x="448" y="122" class="mono axis">high</text>
    <text x="448" y="274" class="mono axis">low</text>
  </g>

  <!-- manual process baseline: stays high, jitters upward -->
  <path class="line-polyglot"
        d="M 448 150 L 500 146 L 552 152 L 604 142 L 656 148 L 708 138 L 760 144 L 812 134"/>

  <!-- automated pipeline: descends -->
  <path class="line-unified" pathLength="1"
        d="M 448 156 C 500 158, 530 172, 570 192 C 615 214, 650 232, 700 246 C 740 256, 780 260, 812 262"/>

  <g class="endpoint">
    <circle cx="812" cy="262" r="3.5" fill="#E3B341"/>
    <circle cx="812" cy="262" r="7" fill="none" stroke="#E3B341" stroke-opacity="0.3"/>
  </g>

  <g class="fade f3">
    <rect x="448" y="308" width="18" height="2" fill="#E3B341"/>
    <text x="474" y="313" class="mono chip">automated pipeline</text>
    <rect x="640" y="308" width="18" height="2" fill="#484F58"/>
    <text x="666" y="313" class="mono chip">manual process</text>

    <text x="448" y="352" class="mono label">CURRENT FOCUS</text>
    <text x="448" y="374" class="mono item">backend systems · ai infrastructure</text>
  </g>

  <!-- ─── status strip ─── -->
  <line x1="0" y1="404" x2="880" y2="404" stroke="#1C2128"/>
  <circle class="pulse-dot"  cx="42" cy="424" r="3"/>
  <circle class="pulse-ring" cx="42" cy="424" r="3"/>
  <text x="54"  y="428" class="mono chip">status: building</text>
  <text x="200" y="428" class="mono chip" fill="#484F58">|</text>
  <text x="222" y="428" class="mono chip">stack: python · postgres · docker</text>
  <text x="844" y="428" text-anchor="end" class="mono label">400+ INSTITUTIONS SERVED · IEEE PUBLISHED</text>
</svg>
